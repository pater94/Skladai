<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkładAI safe mode</title>
  <meta name="theme-color" content="#0a0f0d">
  <style>
    body {
      margin: 0;
      padding: 24px 16px;
      background: #0a0f0d;
      color: #e6ffe6;
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }
    h1 { font-size: 22px; margin: 0 0 12px; color: #84cc16; }
    .hint { margin: 0 0 16px; color: #9ca3af; font-size: 13px; }
    ul { list-style: none; padding: 0; margin: 0; background: #101814; border: 1px solid #1f2a24; border-radius: 8px; overflow: hidden; }
    li { padding: 10px 12px; border-top: 1px solid #1f2a24; display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    li:first-child { border-top: none; }
    .k { color: #9ca3af; flex-shrink: 0; }
    .v { color: #e6ffe6; text-align: right; word-break: break-word; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .hdr { color: #fbbf24; font-weight: 700; }
  </style>
</head>
<body>
  <h1>SkładAI safe mode</h1>
  <p class="hint">
    Czysty HTML, żadnego Next.js, żadnego Reacta, żadnego Capacitor plugin.
    Jeśli widzisz tę listę w WKWebView, network + HTML rendering działa.
  </p>
  <ul id="diag">
    <li><span class="k">Script status</span><span class="v">(nie wystartował)</span></li>
  </ul>

  <script>
  (function () {
    function safe(fn, fallback) {
      try { var v = fn(); return (v === undefined || v === null) ? fallback : v; }
      catch (e) { return "(error: " + (e && e.message ? e.message : e) + ")"; }
    }
    function yn(v) { return v ? "yes" : "no"; }

    function capInfo() {
      var w = window;
      if (!w.Capacitor) return "undefined (not a Capacitor WebView)";
      var parts = ["object"];
      try { if (typeof w.Capacitor.isNativePlatform === "function") parts.push("isNativePlatform=" + w.Capacitor.isNativePlatform()); }
      catch (e) { parts.push("isNativePlatform threw"); }
      try { if (typeof w.Capacitor.getPlatform === "function") parts.push("platform=" + w.Capacitor.getPlatform()); }
      catch (e) { parts.push("getPlatform threw"); }
      return parts.join(", ");
    }

    function lsCheck() {
      try {
        localStorage.setItem("__safe_probe", "1");
        localStorage.removeItem("__safe_probe");
        return "writable";
      } catch (e) { return "blocked: " + (e && e.message ? e.message : e); }
    }

    function cookieCheck() {
      try { return "accessible (" + (document.cookie ? document.cookie.length + " chars" : "empty") + ")"; }
      catch (e) { return "blocked"; }
    }

    var items = [
      ["HEADER", "Runtime", true],
      ["Timestamp", safe(function () { return new Date().toISOString(); }, "(no Date)")],
      ["URL", safe(function () { return location.href; }, "?")],
      ["Protocol", safe(function () { return location.protocol; }, "?")],
      ["Host", safe(function () { return location.host; }, "?")],
      ["Referrer", safe(function () { return document.referrer || "(none)"; }, "?")],

      ["HEADER", "Device", true],
      ["userAgent", safe(function () { return navigator.userAgent; }, "?")],
      ["navigator.platform", safe(function () { return navigator.platform; }, "?")],
      ["navigator.language", safe(function () { return navigator.language; }, "?")],
      ["navigator.languages", safe(function () { return (navigator.languages || []).join(","); }, "?")],
      ["screen (w×h)", safe(function () { return screen.width + " × " + screen.height; }, "?")],
      ["window (w×h)", safe(function () { return window.innerWidth + " × " + window.innerHeight; }, "?")],
      ["devicePixelRatio", safe(function () { return String(window.devicePixelRatio); }, "?")],
      ["document.visibilityState", safe(function () { return document.visibilityState; }, "?")],

      ["HEADER", "Capacitor", true],
      ["window.Capacitor", capInfo()],
      ["window.webkit.messageHandlers", safe(function () {
        var w = window;
        return yn(!!(w.webkit && w.webkit.messageHandlers));
      }, "?")],

      ["HEADER", "Storage & Net", true],
      ["localStorage", lsCheck()],
      ["cookies", cookieCheck()],
      ["Caches API", yn("caches" in window)],
      ["indexedDB", yn("indexedDB" in window)],
      ["Service Worker API", yn("serviceWorker" in navigator)],
      ["SW registrations", "(querying…)", "diag-sw"],
      ["fetch", yn(typeof fetch === "function")],

      ["HEADER", "JS features", true],
      ["Promise", yn(typeof Promise === "function")],
      ["BigInt", yn(typeof BigInt === "function")],
      ["structuredClone", yn(typeof structuredClone === "function")],
      ["WebCrypto (subtle)", yn(!!(window.crypto && window.crypto.subtle))],
      ["CSS.supports", yn(typeof CSS !== "undefined" && typeof CSS.supports === "function")],
      ["CSS @layer supported", safe(function () { return yn(CSS.supports("at-rule: @layer")); }, "?")]
    ];

    var ul = document.getElementById("diag");
    ul.innerHTML = "";
    for (var i = 0; i < items.length; i++) {
      var k = items[i][0];
      var v = items[i][1];
      var id = items[i][2];
      var li = document.createElement("li");
      if (k === "HEADER") {
        li.innerHTML = '<span class="hdr">' + String(v) + "</span>";
        li.style.justifyContent = "flex-start";
        li.style.borderTop = i === 0 ? "none" : "1px solid #1f2a24";
        li.style.background = "#0f1512";
      } else {
        var kEl = document.createElement("span"); kEl.className = "k"; kEl.textContent = k;
        var vEl = document.createElement("span"); vEl.className = "v"; vEl.textContent = String(v);
        if (id === true) { /* ignore */ }
        else if (typeof id === "string") { vEl.id = id; }
        li.appendChild(kEl); li.appendChild(vEl);
      }
      ul.appendChild(li);
    }

    if ("serviceWorker" in navigator) {
      try {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var el = document.getElementById("diag-sw");
          if (el) el.textContent = String(regs.length) + " registration(s)";
        }).catch(function (e) {
          var el = document.getElementById("diag-sw");
          if (el) el.textContent = "error: " + (e && e.message ? e.message : e);
        });
      } catch (e) {}
    }
  })();
  </script>
</body>
</html>
