name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear stale SPM artifact cache
        # No-op on this branch (workflow uses CocoaPods, not SPM) but
        # kept for consistency with other test-binary-* branches where
        # Xcode 26.x has a known SPM fatalError on cached xcframework
        # ZIPs. Safe to leave in.
        run: rm -rf ~/Library/Caches/org.swift.swiftpm

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS Archive (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ github.sha }}
          path: ios/App/build/App.xcarchive
          retention-days: 30

