name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore skladai-release.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias skladai \
            -storepass skladai123 \
            -keypass skladai123 \
            -dname "CN=SkładAI, O=SkładAI, L=Tarnobrzeg, C=PL"

      - name: Encode keystore to base64
        run: |
          echo "=== KEYSTORE BASE64 START ==="
          base64 -w 0 skladai-release.jks
          echo ""
          echo "=== KEYSTORE BASE64 END ==="

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: skladai-release.jks
          retention-days: 1
