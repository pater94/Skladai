name: Generate Keystore + PEM

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate upload keystore
        run: |
          keytool -genkey -v \
            -keystore skladai-upload.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias upload \
            -storepass skladai123 \
            -keypass skladai123 \
            -dname "CN=SkładAI, O=SkładAI, L=Tarnobrzeg, C=PL"

      - name: Export PEM certificate
        run: |
          keytool -export -rfc \
            -keystore skladai-upload.jks \
            -alias upload \
            -storepass skladai123 \
            -file upload_certificate.pem
          echo "PEM certificate exported:"
          cat upload_certificate.pem

      - name: Show keystore base64 (for GitHub Secret)
        run: |
          echo "=== Skopiuj poniższy tekst i dodaj jako GitHub Secret: KEYSTORE_BASE64 ==="
          base64 -w 0 skladai-upload.jks
          echo ""
          echo "=== KONIEC ==="

      - name: Upload PEM certificate
        uses: actions/upload-artifact@v4
        with:
          name: upload-certificate-pem
          path: upload_certificate.pem
          retention-days: 30

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: skladai-upload.jks
          retention-days: 90
