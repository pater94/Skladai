name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Decode certificate and provisioning profile
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Import certificate into keychain
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_NAME"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

          # Add temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN_NAME"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            "$(/usr/bin/security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

          # Clean up decoded files
          rm -f "$CERTIFICATE_PATH" "$PROFILE_PATH"

      - name: Install npm dependencies
        working-directory: skladai
        run: npm ci

      - name: Clear stale SPM artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm

      - name: Resolve SPM packages
        working-directory: skladai/ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Bump CFBundleVersion in project.pbxproj
        working-directory: skladai/ios/App
        env:
          # Use a HIGH starting offset (1000) so we never collide with the
          # historic hardcoded values (1, 2). github.run_number increments
          # per workflow run and never repeats.
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          NEW_VERSION=$((1000 + BUILD_NUMBER))
          echo "Bumping CURRENT_PROJECT_VERSION to $NEW_VERSION"
          # Replace ALL occurrences of CURRENT_PROJECT_VERSION = N; in pbxproj
          sed -i.bak -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = $NEW_VERSION;/g" App.xcodeproj/project.pbxproj
          sed -i.bak -E "s/MARKETING_VERSION = [0-9.]+;/MARKETING_VERSION = 1.0.$NEW_VERSION;/g" App.xcodeproj/project.pbxproj
          rm -f App.xcodeproj/project.pbxproj.bak
          echo "After bump:"
          grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION" App.xcodeproj/project.pbxproj

      - name: Build signed iOS archive
        working-directory: skladai/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="AWRQPLPRL6" \
            PROVISIONING_PROFILE_SPECIFIER="SkladAI Distribution" \
            CODE_SIGN_IDENTITY="iPhone Distribution"

      - name: Create ExportOptions.plist
        working-directory: skladai/ios/App
        run: |
          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>AWRQPLPRL6</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.skladai.app</key>
              <string>SkladAI Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        working-directory: skladai/ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa-output \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ github.sha }}
          path: skladai/ios/App/build/App.xcarchive
          retention-days: 30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: skladai-ipa
          path: skladai/ios/App/build/ipa-output/*.ipa
          retention-days: 30

      - name: Upload to App Store Connect
        working-directory: skladai/ios/App
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
        run: |
          # Decode base64-encoded .p8 key
          mkdir -p ~/.private_keys
          KEY_FILE=~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$KEY_FILE"

          # Verify the key file looks valid
          echo "Key file size: $(wc -c < "$KEY_FILE") bytes"
          head -1 "$KEY_FILE"
          tail -1 "$KEY_FILE"

          # Upload IPA to App Store Connect
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa-output/*.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
