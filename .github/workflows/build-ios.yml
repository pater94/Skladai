name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install npm dependencies
        working-directory: skladai
        run: npm ci

      - name: Resolve SPM packages
        working-directory: skladai/ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build iOS Archive (unsigned)
        working-directory: skladai/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ github.sha }}
          path: skladai/ios/App/build/App.xcarchive
          retention-days: 30
