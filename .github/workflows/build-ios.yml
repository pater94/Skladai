name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: skladai
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: skladai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install || true

      - name: Build iOS Archive (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ github.sha }}
          path: skladai/ios/App/build/App.xcarchive
          retention-days: 30

  # ─── Signed build (requires Apple certificates in GitHub Secrets) ───
  # Uncomment after adding: APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD,
  # APPLE_PROVISIONING_PROFILE, APPLE_TEAM_ID
