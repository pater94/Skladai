name: Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm dependencies
        working-directory: skladai
        run: npm ci

      - name: Build Release AAB
        working-directory: skladai/android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: skladai/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build APK (for testing)
        working-directory: skladai/android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: skladai/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
